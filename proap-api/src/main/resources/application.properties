
info.app.name=@project.name@
info.app.version=@project.version@

spring.config.import=optional:file:.env[.properties]

server.port=${API_PORT:8080}
spring.mvc.pathmatch.matching-strategy=ant_path_matcher

app.jwtSecret=${JWT_SECRET:minha-chave-padrao-caso-env-falhe}
app.jwtExpirationInMs=3600000

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.generate-ddl=true
spring.jpa.properties.hibernate.default_schema=proap
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=true
spring.flyway.schemas=proap
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=false

logging.level.org.springframework.security=DEBUG

file.upload-dir=${FILE_UPLOAD_DIR:./uploads}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

app.mail.enabled=${MAIL_ENABLED:true}
app.mail.from=${SPRING_MAIL_USERNAME}
spring.mail.host=${SPRING_MAIL_HOST}
spring.mail.port=${SPRING_MAIL_PORT}
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from-alias=${SPRING_MAIL_USERNAME}

mail.template.url.recoverPassword=${RECOVER_PASSWORD_URL}
cors.allowed-origins=http://localhost:5173,https://*.ufba.br

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always

logging.level.org.springframework.web=DEBUG